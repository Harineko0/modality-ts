name: Extract Validity

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  validity:
    name: Extract validity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build native checker
        run: pnpm build:rust
      - name: Typecheck
        run: pnpm typecheck
      - name: Validity
        run: pnpm validity -- --report .modality/validity/report.json --comment .modality/validity/comment.md
      - name: Get comment ID
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v2
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: 'Extract-validity report:'
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body-path: .modality/validity/comment.md
      - name: Upload validity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extract-validity-report
          path: .modality/validity/
