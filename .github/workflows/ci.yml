name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Architecture
        run: pnpm architecture

      - name: Clean
        run: pnpm clean

      - name: Build
        run: pnpm build

      - name: Demo acceptance
        run: pnpm demo

      - name: Examples CI
        run: pnpm ci:examples

      - name: Phase 7 smoke
        run: pnpm phase7 -- --random 5
