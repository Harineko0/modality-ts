name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Fetch Rust dependencies
        run: cargo fetch --locked --manifest-path crates/checker/Cargo.toml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Architecture
        run: pnpm architecture

      - name: Clean
        run: pnpm clean

      - name: Build
        run: pnpm build

      - name: Packaging smoke
        run: |
          files="$(npm pack --dry-run --json | node -e "const fs=require('node:fs');const data=JSON.parse(fs.readFileSync(0,'utf8'));process.stdout.write((data[0]?.files??[]).map((f)=>f.path).join('\n'));")"
          echo "$files" | grep -q '^dist/'
          case "$(uname -s)-$(uname -m)" in
            Darwin-arm64) expected='native/modality-checker.darwin-arm64.node' ;;
            Darwin-x86_64) expected='native/modality-checker.darwin-x64.node' ;;
            Linux-x86_64) expected='native/modality-checker.linux-x64-gnu.node' ;;
            Linux-aarch64) expected='native/modality-checker.linux-arm64-gnu.node' ;;
            MINGW*-x86_64|MSYS*-x86_64) expected='native/modality-checker.win32-x64-msvc.node' ;;
            *) echo "No packaging smoke mapping for $(uname -s)-$(uname -m)"; exit 1 ;;
          esac
          echo "$files" | grep -qx "$expected"

      - name: Demo acceptance
        run: pnpm demo

      - name: Examples CI
        run: pnpm ci:examples

      - name: Phase 7 smoke
        run: pnpm phase7 -- --random 5
