name: Benchmarks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  benchmarks:
    name: Modality benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build native checker
        run: pnpm build:rust
      - name: Typecheck
        run: pnpm typecheck
      - name: Benchmarks
        run: pnpm benchmarks -- --report .modality/benchmarks/report.json
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Benchmark report: [link](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          comment-id: ${{ steps.comment.outputs.comment-id }}
      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ledgerops-benchmark-report
          path: .modality/benchmarks/
